<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bibliothèque de Recettes | AH Coaching</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Header -->
    <div class="catalog-header">
        <div class="brand">Arthur Hénon · <span>AH Coaching</span></div>
        <h1>Bibliothèque de Recettes</h1>
        <p class="subtitle">Recettes adaptatives personnalisées selon tes objectifs</p>

        <!-- Search -->
        <div class="search-container">
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
            </svg>
            <input type="text" class="search-input" id="search-input" placeholder="Rechercher une recette...">
        </div>
    </div>

    <!-- Filters -->
    <div class="filter-bar" id="filter-bar">
        <!-- Category filters -->
        <button class="filter-btn active" data-filter="all">Toutes</button>
        <button class="filter-btn" data-filter="petit-dej-sucre">Petit-déj sucré</button>
        <button class="filter-btn" data-filter="petit-dej-sale">Petit-déj salé</button>
        <button class="filter-btn" data-filter="dejeuner">Déjeuner</button>
        <button class="filter-btn" data-filter="diner">Dîner</button>
        <button class="filter-btn" data-filter="collation-emporter">Collation à emporter</button>
        <button class="filter-btn" data-filter="collation-maison">Collation maison</button>

        <div class="filter-separator"></div>

        <!-- Difficulty filters -->
        <button class="filter-btn" data-difficulty="Facile">Facile</button>
        <button class="filter-btn" data-difficulty="Moyen">Moyen</button>
        <button class="filter-btn" data-difficulty="Avancé">Avancé</button>
    </div>

    <!-- Results count -->
    <div class="results-info" id="results-info">
        <strong id="results-count">50</strong> recettes disponibles
    </div>

    <!-- Recipe Grid -->
    <div class="recipes-grid" id="recipes-grid">
        <!-- Cards generated by JS -->
    </div>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-brand">AH Coaching</div>
        <div class="footer-credits">Réalisé par Arthur Hénon & Mathilde Vion</div>
        <div class="footer-subtitle">Coach sportif diplômé & Ingénieure en nutrition</div>
    </footer>

    <script src="js/nutrition-db.js"></script>
    <script src="js/recipes-data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
